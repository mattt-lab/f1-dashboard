name: Update F1 Race News

on:
  schedule:
    - cron: '15 */3 * * 5,6,0'  # Every 3h on Fri/Sat/Sun (race weekends)
    - cron: '15 9 * * 1,2,3,4'  # Once at 09:15 UTC on Mon–Thu (between races)
  workflow_dispatch:
    # Also triggerable manually from the Actions tab

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Run fetch_news.py
        run: python scripts/fetch_news.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit data/race-news.json if changed
        run: |
          git config user.name  "F1 News Bot"
          git config user.email "actions@github.com"
          git add data/race-news.json
          # Only commit when content actually changed
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: update race news [skip ci]"
            git push
          fi
